<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 80">
  <defs>
    <clipPath id="tower">
      <path d="M 11 66 L 15 19 L 25 19 L 29 66 Z"/>
    </clipPath>
  </defs>

  <!-- Base building -->
  <rect x="9" y="66" width="22" height="12" rx="1" fill="#888" opacity="0.5"/>

  <!-- Tower: white base -->
  <path d="M 11 66 L 15 19 L 25 19 L 29 66 Z" fill="white"/>

  <!-- Black spiral stripes clipped to tower -->
  <g clip-path="url(#tower)">
    <rect x="2"  y="19" width="36" height="9"  fill="black" transform="skewY(-12)"/>
    <rect x="2"  y="37" width="36" height="9"  fill="black" transform="skewY(-12)"/>
    <rect x="2"  y="55" width="36" height="9"  fill="black" transform="skewY(-12)"/>
  </g>

  <!-- Tower outline -->
  <path d="M 11 66 L 15 19 L 25 19 L 29 66 Z" fill="none" stroke="#555" stroke-width="1"/>

  <!-- Gallery / watch deck -->
  <rect x="12" y="15" width="16" height="4" rx="0.5" fill="#333"/>
  <line x1="12" y1="19" x2="28" y2="19" stroke="#333" stroke-width="0.8"/>

  <!-- Lantern room — safety red -->
  <rect x="14" y="8" width="12" height="7" rx="0.5" fill="#cc2200"/>

  <!-- Dome — safety red -->
  <path d="M 14 8 Q 20 3 26 8 Z" fill="#cc2200"/>

  <!-- Light -->
  <circle cx="20" cy="11" r="2.5" fill="white" opacity="0.95"/>

  <!-- Rod -->
  <line x1="20" y1="1" x2="20" y2="4" stroke="#333" stroke-width="1.2"/>
</svg>
