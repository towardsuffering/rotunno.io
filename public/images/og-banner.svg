<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0f1e"/>
      <stop offset="50%"  stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c1f3a"/>
    </linearGradient>
    <linearGradient id="emeraldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#34d399" stop-opacity="1"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid across full canvas -->
  <g fill="#38bdf8" opacity="0.05">
    <circle cx="40"  cy="40"  r="1.5"/><circle cx="100" cy="40"  r="1.5"/><circle cx="160" cy="40"  r="1.5"/><circle cx="220" cy="40"  r="1.5"/><circle cx="280" cy="40"  r="1.5"/><circle cx="340" cy="40"  r="1.5"/><circle cx="400" cy="40"  r="1.5"/><circle cx="460" cy="40"  r="1.5"/><circle cx="520" cy="40"  r="1.5"/>
    <circle cx="40"  cy="100" r="1.5"/><circle cx="100" cy="100" r="1.5"/><circle cx="160" cy="100" r="1.5"/><circle cx="220" cy="100" r="1.5"/><circle cx="280" cy="100" r="1.5"/><circle cx="340" cy="100" r="1.5"/><circle cx="400" cy="100" r="1.5"/><circle cx="460" cy="100" r="1.5"/><circle cx="520" cy="100" r="1.5"/>
    <circle cx="40"  cy="160" r="1.5"/><circle cx="100" cy="160" r="1.5"/><circle cx="160" cy="160" r="1.5"/><circle cx="220" cy="160" r="1.5"/><circle cx="280" cy="160" r="1.5"/><circle cx="340" cy="160" r="1.5"/><circle cx="400" cy="160" r="1.5"/><circle cx="460" cy="160" r="1.5"/><circle cx="520" cy="160" r="1.5"/>
    <circle cx="40"  cy="220" r="1.5"/><circle cx="100" cy="220" r="1.5"/><circle cx="160" cy="220" r="1.5"/><circle cx="220" cy="220" r="1.5"/><circle cx="280" cy="220" r="1.5"/><circle cx="340" cy="220" r="1.5"/><circle cx="400" cy="220" r="1.5"/><circle cx="460" cy="220" r="1.5"/><circle cx="520" cy="220" r="1.5"/>
    <circle cx="40"  cy="280" r="1.5"/><circle cx="100" cy="280" r="1.5"/><circle cx="160" cy="280" r="1.5"/><circle cx="220" cy="280" r="1.5"/><circle cx="280" cy="280" r="1.5"/><circle cx="340" cy="280" r="1.5"/><circle cx="400" cy="280" r="1.5"/><circle cx="460" cy="280" r="1.5"/><circle cx="520" cy="280" r="1.5"/>
    <circle cx="40"  cy="340" r="1.5"/><circle cx="100" cy="340" r="1.5"/><circle cx="160" cy="340" r="1.5"/><circle cx="220" cy="340" r="1.5"/><circle cx="280" cy="340" r="1.5"/><circle cx="340" cy="340" r="1.5"/><circle cx="400" cy="340" r="1.5"/><circle cx="460" cy="340" r="1.5"/><circle cx="520" cy="340" r="1.5"/>
    <circle cx="40"  cy="400" r="1.5"/><circle cx="100" cy="400" r="1.5"/><circle cx="160" cy="400" r="1.5"/><circle cx="220" cy="400" r="1.5"/><circle cx="280" cy="400" r="1.5"/><circle cx="340" cy="400" r="1.5"/><circle cx="400" cy="400" r="1.5"/><circle cx="460" cy="400" r="1.5"/><circle cx="520" cy="400" r="1.5"/>
    <circle cx="40"  cy="460" r="1.5"/><circle cx="100" cy="460" r="1.5"/><circle cx="160" cy="460" r="1.5"/><circle cx="220" cy="460" r="1.5"/><circle cx="280" cy="460" r="1.5"/><circle cx="340" cy="460" r="1.5"/><circle cx="400" cy="460" r="1.5"/><circle cx="460" cy="460" r="1.5"/><circle cx="520" cy="460" r="1.5"/>
    <circle cx="40"  cy="520" r="1.5"/><circle cx="100" cy="520" r="1.5"/><circle cx="160" cy="520" r="1.5"/><circle cx="220" cy="520" r="1.5"/><circle cx="280" cy="520" r="1.5"/><circle cx="340" cy="520" r="1.5"/><circle cx="400" cy="520" r="1.5"/><circle cx="460" cy="520" r="1.5"/><circle cx="520" cy="520" r="1.5"/>
    <circle cx="40"  cy="580" r="1.5"/><circle cx="100" cy="580" r="1.5"/><circle cx="160" cy="580" r="1.5"/><circle cx="220" cy="580" r="1.5"/><circle cx="280" cy="580" r="1.5"/><circle cx="340" cy="580" r="1.5"/><circle cx="400" cy="580" r="1.5"/><circle cx="460" cy="580" r="1.5"/><circle cx="520" cy="580" r="1.5"/>
  </g>

  <!-- Pipeline flow (upper left) -->
  <rect x="40"  y="60" width="100" height="42" rx="7" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <text x="90" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#38bdf8" opacity="0.8" font-weight="600">RAW DATA</text>
  <line x1="142" y1="81" x2="162" y2="81" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"/>
  <polygon points="162,76 172,81 162,86" fill="#38bdf8" opacity="0.5"/>

  <rect x="174" y="60" width="88" height="42" rx="7" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-width="1.5"/>
  <text x="218" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#34d399" font-weight="700">ETL / ELT</text>
  <line x1="264" y1="81" x2="284" y2="81" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"/>
  <polygon points="284,76 294,81 284,86" fill="#38bdf8" opacity="0.5"/>

  <rect x="296" y="60" width="104" height="42" rx="7" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <text x="348" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#38bdf8" opacity="0.8" font-weight="600">WAREHOUSE</text>
  <line x1="402" y1="81" x2="422" y2="81" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"/>
  <polygon points="422,76 432,81 422,86" fill="#38bdf8" opacity="0.5"/>

  <rect x="434" y="52" width="106" height="58" rx="7" fill="#34d399" fill-opacity="0.18" stroke="#34d399" stroke-width="2" filter="url(#glow)"/>
  <text x="487" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#34d399" font-weight="800">INSIGHT</text>
  <text x="487" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#34d399" opacity="0.7">Decision-Ready</text>

  <!-- KPI Cards -->
  <rect x="40"  y="160" width="152" height="104" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.3"/>
  <text x="116" y="216" text-anchor="middle" font-family="Arial,sans-serif" font-size="46" font-weight="900" fill="#34d399" filter="url(#glow)">80%</text>
  <text x="116" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="white" opacity="0.5" letter-spacing="1">COST REDUCTION</text>
  <text x="116" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="white" opacity="0.3">API ingestion pipeline</text>

  <rect x="204" y="160" width="152" height="104" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.3"/>
  <text x="280" y="216" text-anchor="middle" font-family="Arial,sans-serif" font-size="46" font-weight="900" fill="#38bdf8" filter="url(#glow)">99%</text>
  <text x="280" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="white" opacity="0.5" letter-spacing="1">SYSTEM UPTIME</text>
  <text x="280" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="white" opacity="0.3">24/7 infrastructure</text>

  <rect x="368" y="160" width="152" height="104" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.3"/>
  <text x="444" y="216" text-anchor="middle" font-family="Arial,sans-serif" font-size="46" font-weight="900" fill="#34d399" filter="url(#glow)">30%</text>
  <text x="444" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="white" opacity="0.5" letter-spacing="1">EFFICIENCY GAIN</text>
  <text x="444" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="white" opacity="0.3">Pipeline optimisation</text>

  <!-- Trend line (lower left) -->
  <polyline points="40,570 100,542 160,556 220,516 280,496 340,470 400,448 460,426 520,406 540,394" fill="none" stroke="#34d399" stroke-width="2" opacity="0.22" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#34d399" opacity="0.38">
    <circle cx="40"  cy="570" r="3"/>
    <circle cx="160" cy="556" r="3"/>
    <circle cx="280" cy="496" r="3"/>
    <circle cx="400" cy="448" r="3"/>
    <circle cx="520" cy="406" r="4"/>
  </g>
  <text x="40" y="598" font-family="Arial,sans-serif" font-size="9" fill="white" opacity="0.18" letter-spacing="1">PERFORMANCE OVER TIME</text>

  <!-- Vertical divider -->
  <line x1="575" y1="30" x2="575" y2="600" stroke="#34d399" stroke-width="1.5" opacity="0.18"/>
  <circle cx="575" cy="30"  r="3" fill="#34d399" opacity="0.32"/>
  <circle cx="575" cy="600" r="3" fill="#34d399" opacity="0.32"/>

  <!-- ── RIGHT: MAIN TEXT BLOCK ── -->

  <!-- Name -->
  <text x="1155" y="178" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="52" font-weight="900"
    fill="white" letter-spacing="-1">Christopher A. Rotunno</text>

  <!-- Title -->
  <text x="1155" y="222" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="25" font-weight="600"
    fill="#38bdf8" letter-spacing="0.3">Data Analytics Engineer &amp; BI Leader</text>

  <!-- Emerald rule -->
  <line x1="608" y1="248" x2="1155" y2="248" stroke="url(#emeraldLine)" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="1155" y="326" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="52" font-weight="800"
    fill="white" letter-spacing="-0.5">Putting Insights</text>

  <text x="1155" y="390" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="52" font-weight="800"
    fill="#34d399" letter-spacing="-0.5"
    filter="url(#glowStrong)">To Action.</text>

  <!-- Open to work -->
  <text x="1155" y="452" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="16" font-weight="700"
    fill="#34d399" letter-spacing="1"
    filter="url(#glow)">&#x25CF; OPEN TO WORK &#xB7; Remote &#xB7; Hybrid &#xB7; Open to Relocate Worldwide</text>

  <!-- Tech stack -->
  <text x="1155" y="477" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="12" font-weight="400"
    fill="white" opacity="0.28" letter-spacing="2">SQL &#xB7; Python &#xB7; Spark &#xB7; AWS &#xB7; Tableau &#xB7; Docker</text>

  <!-- URL -->
  <text x="1155" y="522" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="20" font-weight="700"
    fill="#34d399" letter-spacing="4"
    filter="url(#glow)">ROTUNNO.IO</text>

</svg>
