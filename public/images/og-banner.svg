<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0f1e"/>
      <stop offset="55%"  stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c1f3a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Very subtle dot texture -->
  <g fill="#38bdf8" opacity="0.04">
    <circle cx="80"  cy="80"  r="1.5"/><circle cx="320" cy="80"  r="1.5"/><circle cx="600" cy="80"  r="1.5"/><circle cx="880" cy="80"  r="1.5"/><circle cx="1120" cy="80"  r="1.5"/>
    <circle cx="80"  cy="315" r="1.5"/><circle cx="320" cy="315" r="1.5"/><circle cx="600" cy="315" r="1.5"/><circle cx="880" cy="315" r="1.5"/><circle cx="1120" cy="315" r="1.5"/>
    <circle cx="80"  cy="550" r="1.5"/><circle cx="320" cy="550" r="1.5"/><circle cx="600" cy="550" r="1.5"/><circle cx="880" cy="550" r="1.5"/><circle cx="1120" cy="550" r="1.5"/>
  </g>

  <!-- Name -->
  <text x="600" y="200" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="62" font-weight="900"
    fill="white" letter-spacing="-1">Christopher A. Rotunno</text>

  <!-- Title -->
  <text x="600" y="244" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="26" font-weight="600"
    fill="#38bdf8">Data Analytics Engineer &amp; BI Leader</text>

  <!-- Rule -->
  <line x1="300" y1="272" x2="900" y2="272" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="58" font-weight="800"
    fill="white" letter-spacing="-1">Putting Insights</text>

  <text x="600" y="420" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="58" font-weight="800"
    fill="#34d399" letter-spacing="-1"
    filter="url(#glowStrong)">To Action.</text>

  <!-- Open to Work -->
  <text x="600" y="478" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="14" font-weight="700"
    fill="#34d399" letter-spacing="0.5"
    filter="url(#glow)">&#x25CF; OPEN TO WORK &#xB7; Remote &#xB7; Hybrid &#xB7; Open to Relocate Worldwide</text>

  <!-- URL -->
  <text x="600" y="535" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="18" font-weight="700"
    fill="#34d399" letter-spacing="5"
    filter="url(#glow)">ROTUNNO.IO</text>

</svg>
