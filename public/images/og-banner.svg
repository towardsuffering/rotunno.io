<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0f1e"/>
      <stop offset="55%"  stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c1f3a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Sparse dot grid — texture only -->
  <g fill="#38bdf8" opacity="0.05">
    <circle cx="100" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/><circle cx="500" cy="100" r="1.5"/><circle cx="700" cy="100" r="1.5"/><circle cx="900" cy="100" r="1.5"/><circle cx="1100" cy="100" r="1.5"/>
    <circle cx="100" cy="315" r="1.5"/><circle cx="300" cy="315" r="1.5"/><circle cx="500" cy="315" r="1.5"/><circle cx="700" cy="315" r="1.5"/><circle cx="900" cy="315" r="1.5"/><circle cx="1100" cy="315" r="1.5"/>
    <circle cx="100" cy="530" r="1.5"/><circle cx="300" cy="530" r="1.5"/><circle cx="500" cy="530" r="1.5"/><circle cx="700" cy="530" r="1.5"/><circle cx="900" cy="530" r="1.5"/><circle cx="1100" cy="530" r="1.5"/>
  </g>

  <!-- Name -->
  <text x="600" y="228" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="58" font-weight="900"
    fill="white" letter-spacing="-1">Christopher A. Rotunno</text>

  <!-- Title -->
  <text x="600" y="272" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="26" font-weight="600"
    fill="#38bdf8" letter-spacing="0.3">Data Analytics Engineer &amp; BI Leader</text>

  <!-- Rule -->
  <line x1="260" y1="298" x2="940" y2="298" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="52" font-weight="800"
    fill="white" letter-spacing="-0.5">Putting Insights</text>

  <text x="600" y="432" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="52" font-weight="800"
    fill="#34d399" letter-spacing="-0.5"
    filter="url(#glowStrong)">To Action.</text>

  <!-- Open to Work -->
  <text x="600" y="488" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="15" font-weight="700"
    fill="#34d399" letter-spacing="0.5"
    filter="url(#glow)">&#x25CF; OPEN TO WORK &#xB7; Remote &#xB7; Hybrid &#xB7; Open to Relocate Worldwide</text>

  <!-- URL -->
  <text x="600" y="542" text-anchor="middle"
    font-family="Arial,Helvetica,sans-serif"
    font-size="18" font-weight="700"
    fill="#34d399" letter-spacing="4"
    filter="url(#glow)">ROTUNNO.IO</text>

</svg>
