<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0f1e"/>
      <stop offset="55%"  stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c1f3a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- Sparse dot grid — texture only -->
  <g fill="#38bdf8" opacity="0.05">
    <circle cx="120" cy="80"  r="1.5"/><circle cx="240" cy="80"  r="1.5"/><circle cx="360" cy="80"  r="1.5"/><circle cx="480" cy="80"  r="1.5"/><circle cx="600" cy="80"  r="1.5"/>
    <circle cx="120" cy="200" r="1.5"/><circle cx="240" cy="200" r="1.5"/><circle cx="360" cy="200" r="1.5"/><circle cx="480" cy="200" r="1.5"/><circle cx="600" cy="200" r="1.5"/>
    <circle cx="120" cy="320" r="1.5"/><circle cx="240" cy="320" r="1.5"/><circle cx="360" cy="320" r="1.5"/><circle cx="480" cy="320" r="1.5"/><circle cx="600" cy="320" r="1.5"/>
  </g>

  <!-- Left accent: minimal data bars -->
  <rect x="64" y="150" width="210" height="4" rx="2" fill="#34d399" opacity="0.30"/>
  <rect x="64" y="166" width="130" height="4" rx="2" fill="#38bdf8" opacity="0.20"/>
  <rect x="64" y="182" width="270" height="4" rx="2" fill="#34d399" opacity="0.18"/>
  <rect x="64" y="198" width="90"  height="4" rx="2" fill="#38bdf8" opacity="0.15"/>
  <rect x="64" y="214" width="180" height="4" rx="2" fill="#34d399" opacity="0.22"/>

  <!-- Name -->
  <text x="1548" y="110" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="60" font-weight="900"
    fill="white" letter-spacing="-1">Christopher A. Rotunno</text>

  <!-- Title -->
  <text x="1548" y="152" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="27" font-weight="600"
    fill="#38bdf8" letter-spacing="0.3">Data Analytics Engineer &amp; BI Leader</text>

  <!-- Rule -->
  <line x1="920" y1="174" x2="1548" y2="174" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="1548" y="226" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="44" font-weight="800"
    fill="white" letter-spacing="-0.5">Putting Insights</text>

  <text x="1548" y="278" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="44" font-weight="800"
    fill="#34d399" letter-spacing="-0.5"
    filter="url(#glowStrong)">To Action.</text>

  <!-- Open to Work -->
  <text x="1548" y="318" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="13" font-weight="700"
    fill="#34d399" letter-spacing="0.5"
    filter="url(#glow)">&#x25CF; OPEN TO WORK &#xB7; Remote &#xB7; Hybrid &#xB7; Open to Relocate Worldwide</text>

  <!-- URL -->
  <text x="1548" y="358" text-anchor="end"
    font-family="Arial,Helvetica,sans-serif"
    font-size="16" font-weight="700"
    fill="#34d399" letter-spacing="3"
    filter="url(#glow)">ROTUNNO.IO</text>

</svg>
